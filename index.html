<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SPYDER TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: black; color: #0f0; font-family: monospace; padding: 20px; text-transform: uppercase; }
        #terminal { border: 1px solid #0f0; padding: 15px; height: 80vh; overflow-y: auto; background: rgba(0, 20, 0, 0.2); }
        .line { margin-bottom: 5px; border-left: 3px solid #0f0; padding-left: 10px; }
        .critical { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
        h2 { border-bottom: 1px solid #0f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h2>SYSTEM MONITOR [SPYDER_v1.0]</h2>
    <div id="terminal"></div>

    <script>
        // Твоя личная ссылка на базу данных
        const firebaseConfig = {
            databaseURL: "https://spyder-monitor-default-rtdb.firebaseio.com/"
        };
        
        // Инициализация связи
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('display_text');

        const term = document.getElementById('terminal');

        // Функция для добавления строк в терминал
        function addLog(text) {
            const line = document.createElement('div');
            line.className = 'line';
            
            // Если в тексте есть упоминание низкого вольтажа (ниже 13.0V), красим в красный
            if (text.includes("LOW") || text.includes("CRITICAL")) {
                line.classList.add('critical');
            }
            
            line.textContent = `> ${new Date().toLocaleTimeString()} | ${text}`;
            term.appendChild(line);
            
            // Автопрокрутка вниз
            term.scrollTop = term.scrollHeight;
        }

        // Слушаем Паука: как только данные в Firebase изменятся, они тут же появятся здесь
        db.on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                addLog(val);
            }
        });

        addLog("TERMINAL ONLINE. AWAITING DATA FROM SPYDER...");
    </script>
</body>
</html>
