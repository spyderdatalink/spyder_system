<!DOCTYPE html>
<html>
<head>
    <title>SPYDER-LINK TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Fallout CRT Эффекты */
        body {
            background-color: #001100;
            color: #1aff1a;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #1aff1a;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }

        /* Эффект мерцания и полос */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Сканирующая полоса */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 3;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(26, 255, 26, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            80% { bottom: 100%; }
            100% { bottom: -10%; }
        }

        #terminal {
            height: 90vh;
            border: 2px solid #1aff1a;
            padding: 20px;
            position: relative;
            background: rgba(0, 20, 0, 0.3);
            box-shadow: inset 0 0 20px #000;
        }

        .header {
            border-bottom: 2px solid #1aff1a;
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-weight: bold;
        }

        .log-entry { margin-bottom: 5px; }
    </style>
</head>
<body class="crt">
    <div class="scanline"></div>
    <div id="terminal">
        <div class="header">ROBCO INDUSTRIES (TM) TERMLINK 1.0 - SPYDER MONITOR</div>
        <div id="output">LOADING DATA...</div>
    </div>

   <script>
    const firebaseConfig = {
        databaseURL: "https://spyder-monitor-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const output = document.getElementById('output');

    database.ref('display_text').on('value', (snapshot) => {
        const data = snapshot.val();
        const time = new Date().toLocaleTimeString();
        output.innerHTML = `<div class="log-entry">[${time}] > ${data}</div>` + output.innerHTML;
    }, (error) => {
        output.innerHTML = `<div style="color:red">ERROR: ${error.message}</div>` + output.innerHTML;
    });
</script>
</body>
</html>
