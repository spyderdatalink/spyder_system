<!DOCTYPE html>
<html>
<head>
    <title>SPYDER-LINK FALLOUT MIRROR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* ПОЛНЫЙ СТИЛЬ FALLOUT CRT */
        body { 
            background-color: #001100; 
            color: #1aff1a; 
            font-family: 'Courier New', Courier, monospace; 
            text-shadow: 0 0 5px #1aff1a; 
            margin: 0; 
            padding: 20px; 
            overflow: hidden; 
        }

        /* Эффект старого монитора */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* Сканирующая полоса */
        .scanline {
            width: 100%; height: 100px; z-index: 11; opacity: 0.1; position: absolute;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(26, 255, 26, 0.2) 50%, rgba(0, 0, 0, 0) 100%);
            bottom: 100%; animation: scanline 8s linear infinite; pointer-events: none;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -20%; } }

        #terminal {
            height: 90vh; border: 2px solid #1aff1a; padding: 20px;
            background: rgba(0, 20, 0, 0.3); box-shadow: inset 0 0 20px #000;
            display: flex; flex-direction: column; position: relative;
        }

        .header { border-bottom: 2px solid #1aff1a; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; }

        /* РАЗДЕЛ DATA (ЗЕРКАЛО) */
        .data-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; 
        }
        .data-box { 
            border: 1px solid #1aff1a; padding: 15px; text-align: center; background: rgba(26, 255, 26, 0.05); 
        }
        .stat-label { font-size: 0.7em; opacity: 0.7; text-transform: uppercase; }
        .stat-value { font-size: 1.8em; font-weight: bold; margin-top: 5px; }

        /* Нижняя инфо-панель */
        .footer-stats { 
            border-top: 2px solid #1aff1a; padding-top: 15px; 
            display: flex; justify-content: space-between; font-size: 0.9em; 
        }

        .alarm-flash { animation: alarm 1s infinite; color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        @keyframes alarm { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        #log { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.8em; opacity: 0.6; }
    </style>
</head>
<body class="crt">
    <div class="scanline"></div>
    <div id="terminal">
        <div class="header">ROBCO INDUSTRIES (TM) TERMLINK 1.0 - SPYDER MIRROR SYSTEM</div>
        
        <div class="top-bar" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <div id="date-time">--.--.---- --:--:--</div>
            <div id="wifi-rssi">WI-FI: SEARCHING...</div>
        </div>

        <div class="data-grid">
            <div class="data-box">
                <div class="stat-label">SUPPLY VOLTAGE</div>
                <div id="vcc" class="stat-value">--.--V</div>
            </div>
            <div class="data-box">
                <div class="stat-label">CPU TEMP</div>
                <div id="temp" class="stat-value">--.-°C</div>
            </div>
        </div>

        <div class="footer-stats">
            <div>DROPS: <span id="drops">0</span></div>
            <div>RAM: <span id="ram">0</span> KB</div>
            <div id="sys-status">SYSTEM: OK</div>
        </div>

        <div id="log"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://spyder-monitor-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);

    // Спрашиваем ключ при каждом входе (он не сохраняется на диске)
    let secretKey = sessionStorage.getItem('spyder_session_token');

    if (!secretKey) {
        secretKey = prompt("ENTER SYSTEM ACCESS KEY (ed7CC...):");
        if (secretKey) {
            sessionStorage.setItem('spyder_session_token', secretKey);
        }
    }

    if (!secretKey) {
        document.body.innerHTML = "<h1 style='color:#00FF00; background:black; text-align:center; padding:50px; font-family:monospace;'>[ ACCESS DENIED ]<br>NO KEY - NO DATA</h1>";
    } else {
        // Функция загрузки данных напрямую через REST API с ключом
        function loadData() {
            const secureUrl = `https://spyder-monitor-default-rtdb.firebaseio.com/display_text.json?auth=${secretKey}`;
            
            fetch(secureUrl)
                .then(res => res.json())
                .then(data => {
                    if (data && data.error) throw new Error(data.error);
                    // Вызываем твою старую функцию отрисовки (например, parseData)
                    if (typeof parseData === "function") parseData(data);
                })
                .catch(err => {
                    console.error("Auth Error");
                    sessionStorage.removeItem('spyder_session_token'); // Стираем плохой ключ
                    alert("WRONG KEY! Access Revoked.");
                    location.reload();
                });
        }

        setInterval(loadData, 3000); // Обновление каждые 3 сек
        loadData();
    }
</script>
</body>
</html>
